<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Funciones de Excel PRO Educativa</title><style>:root{--c1:#006d77;--c2:#83c5be;--c3:#edf6f9;--c4:#ffddd2;--c5:#e29578}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:var(--c3);color:#123}header{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;padding:34px 20px;text-align:center}.wrap{max-width:1100px;margin:auto;padding:22px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.toolbar input{flex:1;padding:14px;border:2px solid var(--c2);border-radius:12px}.toolbar button{padding:12px 16px;border:0;border-radius:12px;background:var(--c1);color:#fff;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}.stat{background:#fff;padding:16px;border-radius:16px;box-shadow:0 8px 18px rgba(0,0,0,.08);text-align:center}.acc{display:grid;gap:14px}.panel{background:#fff;border-radius:18px;box-shadow:0 8px 18px rgba(0,0,0,.08);overflow:hidden}.head{padding:16px 18px;cursor:pointer;font-weight:700;display:flex;justify-content:space-between;align-items:center}.body{display:none;padding:0 18px 18px}.panel.open .body{display:block}.panel:nth-child(5n+1) .head{background:var(--c1);color:#fff}.panel:nth-child(5n+2) .head{background:var(--c2)}.panel:nth-child(5n+3) .head{background:var(--c5)}.panel:nth-child(5n+4) .head{background:#8ecae6}.panel:nth-child(5n) .head{background:#b56576;color:#fff}.fn{background:var(--c3);border-left:5px solid var(--c2);padding:12px;border-radius:12px;margin:10px 0}.formula{font-weight:800;color:var(--c1)}.desc{font-size:14px;margin-top:6px}.btncopy{margin-top:8px;padding:8px 12px;border:0;border-radius:10px;background:var(--c4);cursor:pointer}.quiz{margin-top:24px;background:#fff;padding:18px;border-radius:18px;box-shadow:0 8px 18px rgba(0,0,0,.08)}mark{background:var(--c4)}small{opacity:.8}</style></head><body><header><h1>Funciones de Excel PRO Educativa</h1><p>Aprende con ejemplos y menús desplegables</p></header><div class='wrap'><div class='toolbar'><input id='search' placeholder='Buscar función...'><button onclick='openAll()'>Abrir todo</button><button onclick='closeAll()'>Cerrar todo</button></div><div class='stats'><div class='stat'><h3>7</h3><p>Categorías</p></div><div class='stat'><h3 id='count'>47</h3><p>Funciones</p></div><div class='stat'><h3>PRO</h3><p>Modo Educativo</p></div></div><div id='acc' class='acc'></div><div class='quiz'><h2>Mini Quiz</h2><p id='q'></p><button onclick='check(0)'>SUMA</button> <button onclick='check(1)'>PROMEDIO</button> <button onclick='check(2)'>BUSCARV</button><p id='r'></p></div></div><script>const data=[{c:'Matemáticas',i:[['SUMA','Suma valores','=SUMA(A1:A5)'],['PRODUCTO','Multiplica valores','=PRODUCTO(A1:A3)'],['COCIENTE','Divide y devuelve entero','=COCIENTE(10,3)'],['REDONDEAR','Redondea números','=REDONDEAR(8.56,1)'],['ABS','Valor absoluto','=ABS(-5)'],['POTENCIA','Eleva números','=POTENCIA(2,3)']]},{c:'Estadísticas',i:[['PROMEDIO','Calcula media','=PROMEDIO(A1:A5)'],['MAX','Mayor valor','=MAX(A1:A5)'],['MIN','Menor valor','=MIN(A1:A5)'],['MODA','Dato repetido','=MODA(A1:A5)'],['MEDIANA','Valor central','=MEDIANA(A1:A5)'],['CONTAR','Cuenta números','=CONTAR(A1:A5)'],['CONTARA','Cuenta no vacías','=CONTARA(A1:A5)'],['CONTAR.BLANCO','Cuenta vacías','=CONTAR.BLANCO(A1:A5)'],['CONTAR.SI','Cuenta con criterio','=CONTAR.SI(A1:A5,">10")']]},{c:'Lógicas',i:[['SI','Evalúa condición','=SI(A1>3,"Sí","No")'],['Y','Todas verdaderas','=Y(A1>0,B1>0)'],['O','Alguna verdadera','=O(A1>0,B1>0)'],['NO','Niega valor lógico','=NO(A1>0)'],['SI.ERROR','Maneja errores','=SI.ERROR(A1/B1,0)']]},{c:'Texto',i:[['CONCATENAR','Une textos','=CONCATENAR(A1,B1)'],['MAYUSC','Convierte a mayúsculas','=MAYUSC(A1)'],['MINUSC','Convierte a minúsculas','=MINUSC(A1)'],['NOMPROPIO','Iniciales mayúsculas','=NOMPROPIO(A1)'],['SUSTITUIR','Reemplaza texto','=SUSTITUIR(A1,"a","x")'],['ESPACIOS','Quita espacios extras','=ESPACIOS(A1)'],['IZQUIERDA','Extrae izquierda','=IZQUIERDA(A1,3)'],['DERECHA','Extrae derecha','=DERECHA(A1,3)'],['EXTRAE','Extrae desde posición','=EXTRAE(A1,2,3)'],['LARGO','Cuenta caracteres','=LARGO(A1)']]},{c:'Búsqueda y Referencia',i:[['BUSCAR','Busca valor','=BUSCAR(10,A1:A5)'],['BUSCARV','Busca vertical','=BUSCARV(10,A1:B5,2,FALSO)'],['BUSCARH','Busca horizontal','=BUSCARH(10,A1:E2,2,FALSO)'],['BUSCARX','Búsqueda moderna','=BUSCARX(10,A1:A5,B1:B5)'],['INDICE','Devuelve posición','=INDICE(A1:A5,2)'],['COINCIDIR','Busca posición','=COINCIDIR(10,A1:A5,0)']]},{c:'Fecha y Hora',i:[['HOY','Fecha actual','=HOY()'],['AHORA','Fecha y hora actual','=AHORA()'],['FECHA','Crea fecha','=FECHA(2025,5,1)'],['DIAS.LAB','Días laborales','=DIAS.LAB(A1,B1)'],['DIA','Número día','=DIA(A1)'],['MES','Número mes','=MES(A1)'],['AÑO','Número año','=AÑO(A1)']]},{c:'Condicionales',i:[['SUMAR.SI','Suma con criterio','=SUMAR.SI(A1:A5,">10")'],['SUMAR.SI.CONJUNTO','Suma varios criterios','=SUMAR.SI.CONJUNTO(...)'],['PROMEDIO.SI','Promedio con criterio','=PROMEDIO.SI(...)'],['CONTAR.SI.CONJUNTO','Cuenta varios criterios','=CONTAR.SI.CONJUNTO(...)']]}];const acc=document.getElementById('acc');function render(f=''){acc.innerHTML='';let total=0;data.forEach((g,idx)=>{let items=g.i.filter(x=>x[0].toLowerCase().includes(f.toLowerCase()));if(items.length||!f){total+=items.length||g.i.length;let p=document.createElement('div');p.className='panel';p.innerHTML='<div class="head" onclick="toggle(this.parentNode)">'+g.c+' <small>'+(items.length||g.i.length)+' funciones</small></div><div class="body"></div>';let b=p.querySelector('.body');(f?items:g.i).forEach(fn=>{let d=document.createElement('div');d.className='fn';d.innerHTML='<div class="formula">='+fn[0]+'()</div><div class="desc">'+fn[1]+'<br><small>Ejemplo: '+fn[2]+'</small></div><button class="btncopy" onclick="copyTxt(\''+fn[2]+'\')">Copiar ejemplo</button>';b.appendChild(d)});acc.appendChild(p)}});count.textContent=total}function toggle(x){x.classList.toggle('open')}function openAll(){document.querySelectorAll('.panel').forEach(x=>x.classList.add('open'))}function closeAll(){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('open'))}function copyTxt(t){navigator.clipboard.writeText(t)}search.oninput=e=>render(e.target.value);render();const quiz=[['¿Qué función suma valores?',0],['¿Qué función calcula promedio?',1],['¿Qué función busca en tabla?',2]];let qi=0;function ask(){q.textContent=quiz[qi][0];r.textContent=''}function check(n){r.textContent=n===quiz[qi][1]?'✅ Correcto':'❌ Intenta otra vez';if(n===quiz[qi][1]){qi=(qi+1)%quiz.length;setTimeout(ask,700)}}ask();</script></body></html>
